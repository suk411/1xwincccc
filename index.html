  <!-- Version Check & Cache Bust -->
  <script>
    (function() {
      var LOCAL_STORAGE_KEY = 'app_version';
      fetch('/version.json?t=' + Date.now(), { cache: 'no-store' })
        .then(function(response) { return response.json(); })
        .then(function(data) {
          var latestVersion = data.version;
          var storedVersion = localStorage.getItem(LOCAL_STORAGE_KEY);
          if (storedVersion && latestVersion !== storedVersion) {
            localStorage.setItem(LOCAL_STORAGE_KEY, latestVersion);
            window.location.reload();
          } else if (!storedVersion) {
            localStorage.setItem(LOCAL_STORAGE_KEY, latestVersion);
          }
          // Bust public/ asset links with version
          var links = document.querySelectorAll('link[href*="/favicon"], link[href*="/pwa-"], link[href*="/apple-touch"]');
          for (var i = 0; i < links.length; i++) {
            var href = links[i].getAttribute('href');
            if (href && href.indexOf('?v=') === -1) {
              links[i].setAttribute('href', href + '?v=' + latestVersion);
            }
          }
        })
        .catch(function() { /* Silent fail */ });
    })();
  </script>

  <!-- Unregister Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
          registration.unregister();
        }
      });
    }
  </script>
