<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lottery Card UI</title>
    <style>
        :root {
            --card-width: 102px;
            --card-height: 123px;
            --font-main: 'bahnschrift', sans-serif;
        }

        body {
            background-color: #0f0f0f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Container */
        .tab-Lottery.is-wingo {
            width: var(--card-width);
            height: var(--card-height);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-radius: 12px;
            padding: 8px 4px 7px;
            background-image: linear-gradient(160deg, #0d0208 0%, #2a0818 18%, #5a1025 38%, #8a1430 55%, #b81e3a 72%, #d42840 85%, #e83545 100%);
            overflow: hidden;
            font-family: var(--font-main);
            animation: lotteryCardIn-7575de35 .4s cubic-bezier(.25,.46,.45,.94) both,
                       wgScale-7575de35 2s ease-in-out infinite,
                       wgBreathe-7575de35 2.5s ease-in-out infinite;
        }

        /* Glow Effect */
        .tab-Lottery__glow {
            position: absolute;
            top: -25%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 75%;
            border-radius: 50%;
            z-index: 1;
            background-image: radial-gradient(circle, rgba(255, 150, 50, 0.35) 0%, rgba(255, 80, 20, 0.12) 50%, transparent 70%);
        }

        /* Flame Layers */
        .wg-flame {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 2;
            border-radius: 0 0 12px 12px;
        }
        .wg-flame--1 {
            height: 55%;
            background-image: linear-gradient(transparent 0%, rgba(255, 100, 30, 0.03) 15%, rgba(255, 80, 20, 0.08) 35%, rgba(255, 60, 15, 0.16) 55%, rgba(255, 40, 10, 0.26) 75%, rgba(255, 30, 5, 0.35) 100%);
            animation: wgFlame1-7575de35 1.8s ease-in-out infinite;
        }
        .wg-flame--2 {
            height: 40%;
            background-image: linear-gradient(transparent 0%, rgba(255, 200, 55, 0.04) 25%, rgba(255, 160, 30, 0.1) 55%, rgba(255, 120, 20, 0.2) 80%, rgba(255, 80, 10, 0.28) 100%);
            animation: wgFlame2-7575de35 2.5s ease-in-out infinite .3s;
        }
        .wg-flame--3 {
            height: 25%;
            background-image: linear-gradient(transparent 0%, rgba(255, 220, 100, 0.06) 40%, rgba(255, 180, 50, 0.14) 100%);
            animation: wgFlame3-7575de35 2s ease-in-out infinite .7s;
        }

        /* Rings & Halo */
        .wg-halo {
            position: absolute;
            top: 10%;
            left: 50%;
            width: 45px;
            height: 45px;
            background-image: radial-gradient(circle, rgba(255, 215, 0, 0.4) 0%, rgba(255, 180, 50, 0.22) 30%, rgba(255, 120, 30, 0.08) 55%, transparent 75%);
            z-index: 1;
            animation: wgHalo-7575de35 2s ease-in-out infinite;
        }
        .wg-ring {
            position: absolute;
            top: 15%;
            left: 50%;
            width: 30px;
            height: 30px;
            border: 1px solid rgba(255, 200, 50, 0.3);
            border-radius: 50%;
            z-index: 1;
            animation: wgRingExpand-7575de35 2.5s ease-out infinite;
        }
        .wg-ring--2 { animation-delay: 1.25s; }

        /* Embers */
        .wg-ember {
            position: absolute;
            width: 2px;
            height: 2px;
            background-color: #ffcc00;
            border-radius: 50%;
            z-index: 4;
            bottom: 4%;
        }

        /* Tag */
        .wg-tag {
            position: absolute;
            top: 0;
            right: 0;
            padding: 2px 7px;
            background-image: linear-gradient(135deg, #ffd700 0%, #ff8c00 35%, #ff4500 70%, #e02020 100%);
            color: #fff;
            font-size: 8px;
            font-weight: 900;
            border-radius: 0 12px 0 8px;
            z-index: 8;
            animation: wgTagPulse-7575de35 1.5s ease-in-out infinite;
        }

        /* Content */
        .tab-Lottery__icon {
            width: 50px;
            height: 50px;
            z-index: 3;
            margin-top: 10px;
        }
        .tab-Lottery__icon img { width: 100%; height: auto; }

        .tab-Lottery__name {
            font-family: 'Arial Black', Arial, sans-serif;
            font-size: 12px;
            font-weight: 900;
            color: #fff;
            z-index: 3;
            margin: 5px 0 0;
            background: linear-gradient(90deg, #ffd700, #fff8e0, #ffd700, #ffaa00);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: wgTextShimmer-7575de35 3s linear infinite;
        }

        .tab-Lottery__hint {
            font-size: 8px;
            color: rgba(255, 220, 170, 0.95);
            z-index: 3;
            margin: 2px 0 0;
        }

        /* Animations */
        @keyframes lotteryCardIn-7575de35 { 
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes wgScale-7575de35 { 
            0%, 100% { transform: scale(1.08); }
            50% { transform: scale(1.12); }
        }
        @keyframes wgBreathe-7575de35 { 
            0%, 100% { box-shadow: rgba(196, 30, 58, 0.55) 0px 6px 25px, rgba(255, 100, 50, 0.3) 0px 0px 17px, inset 0 1px rgba(255, 220, 160, 0.3); }
            50% { box-shadow: rgba(196, 30, 58, 0.65) 0px 8px 30px, rgba(255, 100, 50, 0.4) 0px 0px 22px, inset 0 1px rgba(255, 220, 160, 0.35); }
        }
        @keyframes wgFlame1-7575de35 { 
            0%, 100% { opacity: 0.5; transform: scaleY(1); }
            25% { opacity: 0.85; transform: scaleY(1.1) scaleX(0.97); }
        }
        @keyframes wgFlame2-7575de35 { 
            0%, 100% { opacity: 0.4; transform: scaleY(1); }
            35% { opacity: 0.75; transform: scaleY(1.15) scaleX(1.04); }
        }
        @keyframes wgFlame3-7575de35 { 
            0%, 100% { opacity: 0.3; transform: scaleY(1); }
            50% { opacity: 0.65; transform: scaleY(1.2); }
        }
        @keyframes wgHalo-7575de35 { 
            0%, 100% { transform: translate(-50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%) scale(1.2); opacity: 1; }
        }
        @keyframes wgRingExpand-7575de35 { 
            0% { transform: translate(-50%) scale(0.4); opacity: 0.6; }
            100% { transform: translate(-50%) scale(1.6); opacity: 0; }
        }
        @keyframes wgTextShimmer-7575de35 { 
            0% { background-position: 200% 50%; }
            100% { background-position: -200% 50%; }
        }
        @keyframes wgTagPulse-7575de35 {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>

<div class="tab-Lottery is-wingo">
    <div class="tab-Lottery__glow"></div>
    <div class="wg-flame wg-flame--1"></div>
    <div class="wg-flame wg-flame--2"></div>
    <div class="wg-flame wg-flame--3"></div>
    <div class="wg-halo"></div>
    <div class="wg-ring wg-ring--1"></div>
    <div class="wg-ring wg-ring--2"></div>
    
    <!-- Sparkles -->
    <i class="wg-ember" style="left: 40%; animation: wgRingExpand-7575de35 2s infinite;"></i>
    <i class="wg-ember" style="left: 60%; animation: wgRingExpand-7575de35 2.5s infinite;"></i>

    <div class="wg-tag">HOT</div>
    
    <div class="tab-Lottery__icon">
        <img src="https://www.rajaluck.com/assets/png/WinGo-b9c59235.png" alt="Win Go">
    </div>
    
    <p class="tab-Lottery__name">Win Go</p>
    <p class="tab-Lottery__hint">Guess the number</p>
</div>

</body>
</html>
