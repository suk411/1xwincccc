<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Container styles */
        .rechargeTypes_list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14.4px;
            width: 100%;
            max-width: 475px;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        /* Item styles */
        .Recharge__content-quickInfo__item {
            display: flex;
            flex-direction: column;
            border-radius: 14.4px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* Active state */
        .Recharge__content-quickInfo__item.item_active {
            background-image: linear-gradient(90deg, rgb(12, 215, 129) 0%, rgb(0, 233, 137) 100%);
            box-shadow: 0 4px 10px rgba(12, 215, 129, 0.3);
        }

        /* Content wrapper */
        .other {
            display: flex;
            flex-direction: column;
            padding: 14.4px 18.7px;
            color: #ffffff; /* White text for contrast against the green gradient */
        }

        /* Text styling */
        .other div:first-child {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .other div:last-child {
            font-size: 14px;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="rechargeTypes_list">
        <!-- Active Item -->
        <div class="Recharge__content-quickInfo__item item_active">
            <div class="other">
                <div>Phonepe_QR</div>
                <div>Balance: 100 - 50K</div>
            </div>
        </div>
        
        <!-- Placeholder for second item based on grid-template-columns -->
        <div class="Recharge__content-quickInfo__item" style="background: #f5f5f5; color: #333;">
            <div class="other" style="color: #333;">
                <div>Other Pay</div>
                <div>Balance: 100 - 20K</div>
            </div>
        </div>
    </div>

</body>
</html>
