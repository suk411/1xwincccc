<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --main-color: #0CD781;
            --text-secondary: rgb(107, 143, 127);
            --card-bg: rgb(255, 255, 255);
            --font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: #f2f2f2;
            padding: 20px;
            font-family: var(--font-family);
        }

        .bankInfo {
            display: block;
            width: 100%;
            max-width: 456px;
            margin: 13.65px 0;
            box-sizing: border-box;
        }

        .bankInfoItem.type1 {
            display: flex;
            align-items: center;
            padding: 13.65px;
            background: var(--card-bg);
            border-radius: 13.65px;
            height: 101.7px;
            box-sizing: border-box;
        }

        /* Left Section (Icon + Bank Name) */
        .bankInfoItem > div:first-child {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 124px;
            height: 74px;
        }

        /* Right Section (Account Number) */
        .bankInfoItem > div:nth-child(2) {
            display: flex;
            flex-direction: column;
            padding-left: 34.13px;
            flex: 1;
            /* Recreating the vertical divider line seen in the style extract */
            background: url("https://yaarwin.org/assets/png/line-0198e433.webp") no-repeat 0 50% / contain;
        }

        .svg-icon {
            width: 32px;
            height: 32px;
            margin-bottom: 4px;
        }

        .bankInfoItem span {
            color: var(--text-secondary);
            font-size: 19.11px;
            font-weight: 400;
            line-height: 1.4;
        }

        /* Adjusting font size for smaller labels */
        .bankInfoItem div:first-child span {
            font-size: 16px;
            text-align: center;
        }

        /* Arrow Icon (Vant UI fallback) */
        .van-icon-arrow {
            position: relative;
            font-size: 20.48px;
            color: var(--text-secondary);
            width: 21px;
            height: 20px;
        }

        .van-icon-arrow::before {
            content: "\203A"; /* Standard chevron character fallback */
            font-weight: bold;
            display: block;
            transform: scale(1.5);
        }

        /* SBI Logo SVG Colors */
        .icon-1 path {
            fill: var(--main-color);
        }
    </style>
</head>
<body>

<div class="bankInfo">
    <div class="bankInfoItem type1">
        <!-- Bank Logo & Name -->
        <div>
            <svg class="svg-icon icon-1" viewBox="0 0 62 59" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M42.7474 21.041C43.8798 22.8892 44.446 25.0217 44.5875 27.1542C55.0621 29.8554 62.1395 35.6843 61.9979 42.0819C61.9979 51.4651 48.1262 59 30.999 59C13.8717 59 0 51.4651 0 42.0819C0 35.4 7.21894 29.5711 17.5519 26.8699C17.5519 29.4289 18.1181 31.9879 19.392 34.2626L29.1588 51.1807C29.8666 52.4602 30.4328 53.8819 30.7159 55.3036L31.1405 54.5928C33.5468 50.4699 33.5468 45.2096 31.1405 41.0867L23.3554 27.5807C20.9491 23.3157 20.9491 18.1976 23.3554 14.0747L23.78 13.3639C24.0631 14.7855 24.6293 16.2072 25.337 17.4867L29.8666 25.4482L36.944 37.8169C37.6517 39.0964 38.2179 40.5181 38.501 41.9398L38.9256 41.2289C41.3319 37.106 41.3319 31.8458 38.9256 27.7229L31.1405 14.2169C28.7342 10.094 28.7342 4.83373 31.1405 0.710843L31.5651 0C31.8482 1.42169 32.4144 2.84337 33.1222 4.12289L42.7474 21.041Z" fill="#0CD781"/>
            </svg>
            <span>State Bank of India</span>
        </div>

        <!-- Divider & Details -->
        <div>
            <span></span> <!-- Placeholder for name if needed -->
            <span>637710****699</span>
        </div>

        <!-- Arrow -->
        <i class="van-badge__wrapper van-icon van-icon-arrow"></i>
    </div>
</div>

</body>
</html>
