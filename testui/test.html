    <style>
        :root {
            --pkr01-Color_bg_03: rgba(211, 54, 93, 0.2);
            --pkr01-Bar_7: 7px;
            --adm-font-family: -apple-system, blinkmacsystemfont, "Helvetica Neue", helvetica, "segoe ui", arial, roboto, "PingFang SC", miui, "Hiragino Sans GB", "Microsoft Yahei", sans-serif;
        }

        body {
            background-color: #1a1a1a;
            margin: 20px;
        }

        ._payChannelPanel_1fnr1_422 {
            position: relative;
            display: flex;
            flex-direction: row;
            box-sizing: border-box;
            margin: 5px 0 0 0;
            gap: 5px;
            width: 376px;
            height: 42px;
            font-family: var(--adm-font-family);
        }

        ._channelItem_1fnr1_435 {
            position: relative;
            background-color: var(--pkr01-Color_bg_03);
            border-radius: var(--pkr01-Bar_7);
            display: flex;
            flex-direction: row;
            align-items: center;
            width: 105px;
            height: 42px;
            cursor: pointer;
            overflow: hidden;
        }

        /* Selection highlight for the active item */
        ._channelSelect_1fnr1_447 {
            width: 105px;
            height: 42px;
            background-color: rgb(177, 44, 73);
            border-radius: 7px;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }

        ._channelItemImg_1fnr1_454 {
            width: 30px;
            height: 30px;
            margin-left: 5px;
            position: relative;
            z-index: 1;
        }

        ._channelItemImg_1fnr1_454 img {
            width: 100%;
            height: 100%;
            display: block;
        }

        ._lbChannelName_1fnr1_460 {
            width: 60px;
            margin-left: 5px;
            font-size: 12px;
            color: #fff;
            text-align: center;
            position: relative;
            z-index: 1;
        }
    </style>
