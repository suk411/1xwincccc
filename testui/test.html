<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Record Detail Exact</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: #111;
            display: flex;
            justify-content: center;
            padding: 40px;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, sans-serif;
        }

        /* Container */
        .MyGameRecordList__C-detail {
            display: block;
            position: relative;
            width: 323.575px;
            padding: 15.008px 0px 15.008px 8.00414px;
            margin: 0px;
            background: transparent;
            color: rgba(255, 255, 255, 0.9);
            font-size: 12px;
            border-top: 0.8px solid rgba(255, 255, 255, 0.06);
            border-bottom: 0.8px solid rgba(255, 255, 255, 0.06);
        }

        /* Title */
        .MyGameRecordList__C-detail-text {
            display: block;
            width: 315.575px;
            height: 23.2px;
            margin: 0px 0px 10.0055px;
            color: rgba(255, 255, 255, 0.85);
            font-size: 20.0105px;
            font-weight: 400;
        }

        /* Row Container */
        .MyGameRecordList__C-detail-line {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            width: 315.575px;
            min-height: 25.0125px;
            margin: 0px 0px 8.00414px;
            padding: 0px 10px; /* Estimated padding for internal text spacing */
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.55);
            font-size: 14.0073px;
            line-height: 25.0135px;
            border-radius: 6.0032px;
        }

        /* Right-side value container */
        .MyGameRecordList__C-detail-line > div:not(.MyGameRecordList__C-inlineB) {
            display: flex;
            align-items: center;
            color: rgba(255, 255, 255, 0.85);
            text-align: right;
        }

        /* Status/Money Red */
        .red {
            color: rgb(242, 65, 59) !important;
        }

        /* Results Elements */
        .MyGameRecordList__C-inlineB {
            display: block;
            line-height: 25.0135px;
        }

        .purpleColor {
            color: rgb(182, 89, 254);
            margin-left: 8.00414px;
        }

        .small {
            color: rgb(109, 167, 244);
            margin-left: 8.00414px;
        }

        /* Copy Icon placeholder */
        .copy-icon {
            width: 12px;
            height: 12px;
            margin-left: 5px;
            background: rgba(255,255,255,0.3);
            display: inline-block;
            mask: url("data:image/svg+xml;base64,PHN2ZyB2aWV3Qm94PSIwIDAgMjQgMjQiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHBhdGggZD0iTTE2IDFIOXAyYTIgMiAwIDAgMCAyIDJ2MTNoOGEyIDIgMCAwIDAgMi0yVjdMMTYgMVpNOSA1SDVhMiAyIDAgMCAwLTIgMnYxNGEyIDIgMCAwIDAgMiAyaDEwYTIgMiAwIDAgMCAyLTJWN0g5VjVaIi8+PC9zdmc+") no-repeat center;
            -webkit-mask: url("data:image/svg+xml;base64,PHN2ZyB2aWV3Qm94PSIwIDAgMjQgMjQiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHBhdGggZD0iTTE2IDFIOXAyYTIgMiAwIDAgMCAyIDJ2MTNoOGEyIDIgMCAwIDAgMi0yVjdMMTYgMVpNOSA1SDVhMiAyIDAgMCAwLTIgMnYxNGEyIDIgMCAwIDAgMiAyaDEwYTIgMiAwIDAgMCAyLTJWN0g5VjVaIi8+PC9zdmc+") no-repeat center;
        }
    </style>
</head>
<body>

    <div class="MyGameRecordList__C-detail">
        <div class="MyGameRecordList__C-detail-text">details</div>
        
        <div class="MyGameRecordList__C-detail-line">
            <span>order number</span>
            <div>WG20260521143912085635293 <span class="copy-icon"></span></div>
        </div>
        
        <div class="MyGameRecordList__C-detail-line">
            <span>betting series</span>
            <div>20260521301759</div>
        </div>
        
        <div class="MyGameRecordList__C-detail-line">
            <span>purchase price</span>
            <div>₹24.00</div>
        </div>
        
        <div class="MyGameRecordList__C-detail-line">
            <span>Buy quantity</span>
            <div>24</div>
        </div>
        
        <div class="MyGameRecordList__C-detail-line">
            <span>Amount after tax</span>
            <div class="red">₹23.52</div>
        </div>
        
        <div class="MyGameRecordList__C-detail-line">
            <span>tax</span>
            <div>₹0.48</div>
        </div>
        
        <div class="MyGameRecordList__C-detail-line">
            <span>results</span>
            <div>
                <span class="MyGameRecordList__C-inlineB">0</span>
                <span class="MyGameRecordList__C-inlineB purpleColor">purple</span>
                <span class="MyGameRecordList__C-inlineB small">small</span>
            </div>
        </div>
        
        <div class="MyGameRecordList__C-detail-line">
            <span>choose</span>
            <div>Big</div>
        </div>
        
        <div class="MyGameRecordList__C-detail-line">
            <span>status</span>
            <div class="red">failed</div>
        </div>
        
        <div class="MyGameRecordList__C-detail-line">
            <span>win lose</span>
            <div class="red">- ₹23.52</div>
        </div>
        
        <div class="MyGameRecordList__C-detail-line">
            <span>time of creation</span>
            <div>2026-05-21 14:39:12</div>
        </div>
    </div>

</body>
</html>
