<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empty State Reproduction</title>
    <style>
        :root {
            --rem: 37.5px; /* Base rem size for scaling */
        }

        body {
            background-color: #0d0208;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* 1. Main Container Layout */
        .empty__container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* 2. Empty State Image */
        .empty__container img {
            width: calc(4 * var(--rem)); /* 150px */
            height: calc(3.71427 * var(--rem)); /* 139px */
            object-fit: contain;
            display: block;
            margin-bottom: 10px;
        }

        /* 3. Empty State Text */
        .empty__container p {
            color: #acafc2;
            font-size: calc(0.34667 * var(--rem)); /* ~13px */
            margin: 0;
            display: block;
        }

    </style>
</head>
<body>

    <div class="empty__container">
        <!-- Exact image asset from the app -->
        <img src="https://www.rajaluck.com/assets/png/empty-d4d79e54.png" alt="No data">
        <p>No data</p>
    </div>

</body>
</html>
