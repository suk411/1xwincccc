<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YaarWin Winning Popup - Final 1:1 Match</title>
    <style>
        :root {
            /* Site's core scaling and colors */
            --rem-base: calc(100vw / 10);
            --winTips: #ffffff99;
            --text-color-l2: #768ca6;
            --bonus-red: #fb5b5b;
        }

        /* 1. EXACT FONT FAMILY STACK */
        body {
            margin: 0;
            background-color: #1a1d21;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, "Segoe UI", Arial, Roboto, "PingFang SC", miui, "Hiragino Sans GB", "Microsoft Yahei", sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        /* Full Overlay */
        .winning {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
            z-index: 99;
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
        }

        /* Popup Body */
        .winning-body.isWin {
            position: absolute;
            width: 7.73333rem;
            height: 10.93333rem;
            background-image: url("../src/assets/wingo/winbg.webp");
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            padding-top: 3.33333rem;
            color: #fff;
            animation: fade-in-fwd 0.5s cubic-bezier(0.39, 0.575, 0.565, 1) both;
            box-sizing: border-box;
        }

        @keyframes fade-in-fwd {
            0% { transform: translate(-50%, -50%) scale(0.6); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .winning-main {
            padding: 0 0.45333rem 0.32rem;
            box-sizing: border-box;
        }

        /* Text Styles */
        .winning-wrap-l1 {
            font-weight: 700;
            font-size: 0.64rem;
            text-align: center;
            height: 0.77333rem;
            line-height: 0.77333rem;
            margin-bottom: 0.45333rem;
        }

        .winner_box {
            display: flex;
            align-items: center;
            height: 1.33333rem;
            padding-left: 0.41333rem;
            font-size: 0.29333rem;
        }

        .winner_box > span {
            margin-right: 0.32rem;
        }

        .winner_result {
            min-width: 3.57333rem;
            display: flex;
            justify-content: space-between;
        }

        .winner_result div {
            border-radius: 0.13333rem;
            min-width: 1.30667rem;
            height: 0.58667rem;
            color: #fff;
            font-size: 0.32rem;
            text-align: center;
            line-height: 0.58667rem;
            background: #f85050;
        }

        .winner_result .color_green { background: #28a745; }
        .winner_result .color_half_green_violet { background: linear-gradient(135deg, #28a745 50%, #8b5cf6 50%); }
        .winner_result .color_half_red_violet { background: linear-gradient(135deg, #f85050 50%, #8b5cf6 50%); }
        .winner_result .color_red { background: #f85050; }

        .winner_result div:nth-child(2) {
            width: 0.53333rem;
            height: 0.53333rem;
            min-width: 0.53333rem;
            border-radius: 50%;
        }

        .winning-wrap-l3 {
            display: block;
            height: 1.73333rem;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
            margin-top: 0.5rem;
        }

        .winning-wrap-l3 .head {
            display: block;
            height: 0.4rem;
            line-height: 0.4rem;
            font-size: 0.34667rem;
            font-weight: 700;
            color: #fb5b5b;
            text-align: center;
            margin-bottom: 0.10667rem;
        }

        .winning-wrap-l3 .bonus {
            display: block;
            height: 0.64rem;
            line-height: 0.64rem;
            font-size: 0.53333rem;
            font-weight: 700;
            color: #fb5b5b;
            text-align: center;
            margin-bottom: 0;
        }

        .winning-wrap-l3 .gameDetail {
            display: block;
            height: 0.37333rem;
            line-height: 0.37333rem;
            font-size: 0.29333rem;
            font-weight: 400;
            color: #6b8f7f;
            text-align: center;
        }

        .winning-wrap-l3 .gameDetail p {
            margin: 0;
            display: block;
        }

        /* 2. CHECKMARK & TIMER LOGIC */
        .winning-wrap-l4 {
            position: absolute;
            left: 0.74667rem;
            bottom: 0.74667rem;
            display: flex;
            align-items: center;
            font-size: 0.32rem;
            color: #fff;
        }

        .acitveBtn {
            height: 0.56rem;
            width: 0.56rem;
            border-radius: 50%;
            background: var(--winTips);
            border: 0.01333rem solid #fff;
            margin-right: 0.18667rem;
            position: relative;
            cursor: pointer;
        }

        /* Exact checkmark icon asset and positioning */
        .acitveBtn.active::before {
            content: "";
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            height: 0.24rem;
            width: 0.32rem;
            display: block;
            background-image: url("../src/assets/wingo/checkmark.webp");
            background-repeat: no-repeat;
            background-size: contain;
            background-position: center;
        }

        .closeBtn {
            width: 0.8rem;
            height: 0.8rem;
            background-image: url("../src/assets/wingo/crossicon.webp");
            background-repeat: no-repeat;
            background-size: contain;
            position: absolute;
            left: 50%;
            transform: translate(-50%, 100%);
            bottom: -0.26667rem;
            cursor: pointer;
        }

        .sprinkle-overlay {
            position: absolute;
            top: -1rem;
            left: 50%;
            transform: translateX(-50%);
            width: 12rem;
            height: 9rem;
            background-image: url("../src/assets/wingo/sprinklingwin.svg");
            background-repeat: no-repeat;
            background-size: contain;
            background-position: center top;
            pointer-events: none;
            z-index: 0;
            animation-name: sprinkle-in;
            animation-duration: 2.5s;
            animation-timing-function: cubic-bezier(0.39, 0.575, 0.565, 1);
            animation-iteration-count: 1;
            animation-fill-mode: forwards;
        }

        @keyframes sprinkle-in {
            0% { transform: translateX(-50%) scale(0.3); opacity: 0; }
            20% { transform: translateX(-50%) scale(1.1); opacity: 0.8; }
            25% { transform: translateX(-50%) scale(1); opacity: 1; }
            80% { transform: translateX(-50%) scale(1); opacity: 1; }
            100% { transform: translateX(-50%) scale(1); opacity: 0; }
        }

        .winning-main {
            position: relative;
            z-index: 1;
        }

        .num-buttons {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 100;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 95vw;
            padding: 0 10px;
            box-sizing: border-box;
        }

        .num-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid #fff;
            background: #2a2d31;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            flex-shrink: 0;
        }

        .num-btn:hover {
            background: #fb5b5b;
        }

        /* Set rem base */
html { font-size: var(--rem-base); }
    </style>
</head>
<body>

<div class="winning" id="popup">
    <div class="winning-body isWin">
        <div class="sprinkle-overlay"></div>
        <div class="winning-main">
            <div class="winning-wrap">
                <div class="winning-wrap-l1">Congratulations</div>
                
                <div class="winning-wrap-l2">
                    <div class="winner_box">
                        <span>Lottery results</span>
                        <div class="winner_result" id="winnerResult">
                            <div class="color_red" id="resultColor">Red</div>
                            <div class="color_red" id="resultNumber">6</div>
                            <div class="color_red" id="resultType">Big</div>
                        </div>
                    </div>
                </div>

                <div class="winning-wrap-l3">
                    <div class="head">Bonus</div>
                    <div class="bonus">₹1.96</div>
                    <div class="gameDetail">
                        Period: WinGo 30sec 
                        <p>20260522100051757</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="winning-wrap-l4">
            <!-- Added 'active' class to show the checkmark icon -->
            <div class="acitveBtn active" id="checkMark"></div> 
            <span id="countdownText">3 seconds auto close</span>
        </div>
        
        <div class="closeBtn" id="popupClose"></div>
    </div>
</div>

<div class="num-buttons" id="numButtons"></div>

<script>
    const resultMap = {
        0: { color: 'color_half_red_violet', label: 'Red', type: 'Small' },
        1: { color: 'color_green', label: 'Green', type: 'Small' },
        2: { color: 'color_red', label: 'Red', type: 'Small' },
        3: { color: 'color_green', label: 'Green', type: 'Small' },
        4: { color: 'color_red', label: 'Red', type: 'Small' },
        5: { color: 'color_half_green_violet', label: 'Green', type: 'Big' },
        6: { color: 'color_red', label: 'Red', type: 'Big' },
        7: { color: 'color_green', label: 'Green', type: 'Big' },
        8: { color: 'color_red', label: 'Red', type: 'Big' },
        9: { color: 'color_green', label: 'Green', type: 'Big' },
    };

    let timerId = null;
    let autoCloseEnabled = true;

    function toggleAutoClose() {
        autoCloseEnabled = !autoCloseEnabled;
        const mark = document.getElementById('checkMark');
        if (autoCloseEnabled) {
            mark.classList.add('active');
            if (document.getElementById('popup').style.display === 'flex') {
                timerId = setTimeout(closePopup, 3000);
            }
        } else {
            mark.classList.remove('active');
            if (timerId) {
                clearTimeout(timerId);
                timerId = null;
            }
        }
    }

    function setResult(num) {
        const r = resultMap[num];
        if (!r) return;
        const colorEl = document.getElementById('resultColor');
        const numEl = document.getElementById('resultNumber');
        const typeEl = document.getElementById('resultType');
        [colorEl, numEl, typeEl].forEach(el => {
            el.className = r.color;
        });
        colorEl.textContent = r.label;
        numEl.textContent = num;
        typeEl.textContent = r.type;
    }

    function showPopup(num) {
        if (timerId) clearTimeout(timerId);
        setResult(num);
        const popup = document.getElementById('popup');
        popup.style.display = 'flex';
        const mark = document.getElementById('checkMark');
        if (autoCloseEnabled) {
            mark.classList.add('active');
            timerId = setTimeout(closePopup, 3000);
        } else {
            mark.classList.remove('active');
        }
    }

    function closePopup() {
        if (timerId) {
            clearTimeout(timerId);
            timerId = null;
        }
        document.getElementById('popup').style.display = 'none';
    }

    for (let i = 0; i <= 9; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;
        btn.className = 'num-btn';
        btn.onclick = () => showPopup(i);
        document.getElementById('numButtons').appendChild(btn);
    }

    document.getElementById('popupClose').onclick = closePopup;
    document.getElementById('checkMark').onclick = toggleAutoClose;
</script>
</body>
</html>
