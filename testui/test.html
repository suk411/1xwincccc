<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finger Animation Component</title>
    <style>
        /* Container to mimic the page layout */
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .demo-container {
            position: relative;
            width: 552px;
            height: 400px;
            border: 1px solid #333;
        }

        /* Root element: ._fingerWrap_foi2h_353 */
        ._fingerWrap_foi2h_353 {
            position: absolute;
            display: block;
            top: 64px;
            left: 48px;
            width: 144px;
            height: 128px;
            z-index: 3;
            overflow: hidden;
            pointer-events: none;
        }

        /* Centered Inner Wrapper */
        .inner-content {
            position: absolute;
            width: 224px;
            height: 224px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        /* Lottie Animation Wrapper */
        ._lottie_wrap_1ksx4_37 {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="demo-container">
        <!-- Reconstructed UI -->
        <div class="._fingerWrap_foi2h_353">
            <div class="inner-content">
                <div id="lottie-target" class="_lottie_wrap_1ksx4_37">
                    <!-- Lottie will render the canvas here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Load Lottie library from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

    <script>
        // Initialize the animation
        const animation = lottie.loadAnimation({
            container: document.getElementById('lottie-target'), // the dom element that will contain the animation
            renderer: 'canvas', // use canvas as requested
            loop: true,
            autoplay: true,
            path: 'https://play1xwin.com/assets/hallPage/animations/shouzi_55742.json' // URL to the finger animation data
        });

        // Optional: Handle errors (e.g., if the URL is blocked by CORS)
        animation.addEventListener('data_failed', () => {
            console.error("Failed to load animation data. This might be due to CORS restrictions on the source URL.");
        });
    </script>
</body>
</html>
