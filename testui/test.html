<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f7f8fa;
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Segoe UI, Arial, sans-serif;
        }

        .toast-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 88px; /* Standard Vant width */
            padding: 16px;
            color: #ffffff;
            font-size: 14px;
            text-align: center;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 8px;
            box-sizing: border-box;
        }

        .toast-icon {
            /* EXACT SIZE MATCH: 36px */
            width: 36px;
            height: 36px;
            fill: #ffffff;
            display: block;
        }

        .toast-text {
            margin-top: 8px;
            line-height: 20px;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="toast-container">
        <!-- Exact 36px Checkmark (No Circle) -->
        <svg class="toast-icon" viewBox="0 0 1024 1024">
            <path d="M403.8 743.9L184.2 524.3c-12.5-12.5-12.5-32.8 0-45.3s32.8-12.5 45.3 0l174.3 174.3L812.2 245c12.5-12.5 32.8-12.5 45.3 0s12.5 32.8 0 45.3L449.1 743.9c-12.5 12.5-32.8 12.5-45.3 0z"></path>
        </svg>
        <div class="toast-text">Refresh successfully</div>
    </div>

</body>
</html>
