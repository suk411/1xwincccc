<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My IP Details Finder</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 50px;
      background-color: #f4f6f9;
    }
    .box {
      max-width: 550px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
    }
    button {
      background-color: #337ab7;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background-color: #286090;
    }
    table {
      width: 100%;
      margin-top: 25px;
      border-collapse: collapse;
      display: none;
      text-align: left;
    }
    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }
    th {
      background-color: #f8f9fa;
      width: 45%;
    }
    .error {
      color: red;
      margin-top: 15px;
      display: none;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Find My Current IP Details</h2>
  <p>Click the button to fetch your live network location data.</p>
  
  <button id="btn">Get My IP Details</button>
  <div id="error" class="error">Failed to get data.</div>

  <table id="resultTable">
    <tr><th>Your IP Address</th><td id="ip"></td></tr>
    <tr><th>City</th><td id="city"></td></tr>
    <tr><th>Region</th><td id="region"></td></tr>
    <tr><th>Country</th><td id="country"></td></tr>
    <tr><th>ISP Provider</th><td id="org"></td></tr>
    <tr><th>Timezone</th><td id="timezone"></td></tr>
  </table>
</div>

<script>
  document.getElementById('btn').addEventListener('click', function() {
    var table = document.getElementById('resultTable');
    var errorDiv = document.getElementById('error');

    table.style.display = 'none';
    errorDiv.style.display = 'none';

    fetch('https://ipapi.co/json/')
      .then(res => res.json())
      .then(data => {
        document.getElementById('ip').innerText = data.ip || 'N/A';
        document.getElementById('city').innerText = data.city || 'N/A';
        document.getElementById('region').innerText = data.region || 'N/A';
        document.getElementById('country').innerText = data.country_name || 'N/A';
        document.getElementById('org').innerText = data.org || 'N/A';
        document.getElementById('timezone').innerText = data.timezone || 'N/A';

        table.style.display = 'table';
      })
      .catch(err => {
        errorDiv.style.display = 'block';
        console.error(err);
      });
  });
</script>

</body>
</html>
