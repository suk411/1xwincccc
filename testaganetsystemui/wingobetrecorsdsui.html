<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            /* Extracted Theme Colors */
            --main-color: #0CD781;
            --primary-text: rgb(34, 57, 53);
            --secondary-text: rgb(107, 143, 127);
            --status-orange: rgb(233, 134, 19);
            --border-light: rgb(216, 235, 228);
            --card-bg: rgb(255, 255, 255);
            --font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, "Segoe UI", Arial, Roboto, "PingFang SC", miui, "Hiragino Sans GB", "Microsoft Yahei", sans-serif;
        }

        body {
            background-color: #f2f2f2;
            padding: 15px;
            font-family: var(--font-family);
            margin: 0;
        }

        /* Container Card */
        .bet-container-lottery-card {
            display: block;
            width: 100%;
            background: var(--card-bg);
            padding: 17.22px 15.9px;
            border-radius: 6.62px 6.62px 0 0;
            box-sizing: border-box;
            color: rgb(0, 0, 0);
        }

        /* Header Section */
        .bet-container-lottery-card-header {
            display: flex;
            flex-direction: column;
            position: relative;
            padding-bottom: 7.95px;
        }

        /* Retina 1px Bottom Border */
        .ar-1px-b::after {
            content: " ";
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            border-bottom: 0.8px solid var(--border-light);
            transform: scaleY(0.5);
            transform-origin: 0 100%;
            pointer-events: none;
        }

        .bet-container-lottery-card-header h1 {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0;
        }

        .bet-container-lottery-card-header h2 {
            margin: 0;
            padding-bottom: 5.3px;
            font-size: 19.87px;
            font-weight: 700;
            color: var(--primary-text);
        }

        .colorE98613 {
            font-size: 18.55px;
            color: var(--status-orange);
            font-weight: 400;
        }

        .bet-container-lottery-card-header p {
            margin: 0;
            font-size: 14.57px;
            color: var(--secondary-text);
            font-weight: 400;
        }

        /* Info List Section */
        .bet-container-lottery-card-info {
            display: flex;
            align-items: center;
            margin-top: 16.56px;
        }

        .bet-container-lottery-card-info ul {
            display: flex;
            flex-direction: column;
            width: 100%;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .bet-container-lottery-card-info li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 6.62px;
            gap: 6.62px;
        }

        .bet-container-lottery-card-info li span:first-child {
            display: flex;
            align-items: center;
            gap: 6.62px;
            color: var(--primary-text);
        }

        .bet-container-lottery-card-info li h2 {
            margin: 0;
            font-size: 15.9px;
            font-weight: 400;
            color: var(--primary-text);
        }

        .bet-container-lottery-card-info li span:last-child,
        .bet-container-lottery-card-info li p {
            margin: 0;
            font-size: 15.9px;
            color: var(--primary-text);
            font-weight: 400;
        }

        /* Exact SVG Icon Implementation */
        .svg-icon {
            width: 13.24px;
            height: 13.24px;
            display: block;
        }

        .icon-round circle:first-child {
            stroke: var(--main-color);
        }

        .icon-round circle:last-child {
            fill: var(--main-color);
        }
    </style>
</head>
<body>

<div class="bet-container-lottery-card">
    <!-- Header -->
    <div class="bet-container-lottery-card-header ar-1px-b">
        <h1>
            <h2>Win Go</h2>
            <span class="colorE98613">Lose</span>
        </h1>
        <p>2026-05-25 10:17:10</p>
    </div>

    <!-- Info List -->
    <div class="bet-container-lottery-card-info">
        <ul>
            <li>
                <span>
                    <svg class="svg-icon icon-round" viewBox="0 0 20 20" fill="none">
                        <circle cx="10" cy="10" r="9.4" fill="white" stroke="#0CD781" stroke-width="1.2"></circle>
                        <circle cx="10" cy="10" r="5" fill="#0CD781"></circle>
                    </svg>
                    <h2>Type</h2>
                </span>
                <span>Win Go 30s</span>
            </li>
            <li>
                <span>
                    <svg class="svg-icon icon-round" viewBox="0 0 20 20" fill="none">
                        <circle cx="10" cy="10" r="9.4" fill="white" stroke="#0CD781" stroke-width="1.2"></circle>
                        <circle cx="10" cy="10" r="5" fill="#0CD781"></circle>
                    </svg>
                    <h2>Period</h2>
                </span>
                <span>20260525100050575</span>
            </li>
            <li>
                <span>
                    <svg class="svg-icon icon-round" viewBox="0 0 20 20" fill="none">
                        <circle cx="10" cy="10" r="9.4" fill="white" stroke="#0CD781" stroke-width="1.2"></circle>
                        <circle cx="10" cy="10" r="5" fill="#0CD781"></circle>
                    </svg>
                    <h2>Order number</h2>
                </span>
                <span>WG2026052504471038104901316467</span>
            </li>
            <li>
                <span>
                    <svg class="svg-icon icon-round" viewBox="0 0 20 20" fill="none">
                        <circle cx="10" cy="10" r="9.4" fill="white" stroke="#0CD781" stroke-width="1.2"></circle>
                        <circle cx="10" cy="10" r="5" fill="#0CD781"></circle>
                    </svg>
                    <h2>Select</h2>
                </span>
                <p>Big</p>
            </li>
            <li>
                <span>
                    <svg class="svg-icon icon-round" viewBox="0 0 20 20" fill="none">
                        <circle cx="10" cy="10" r="9.4" fill="white" stroke="#0CD781" stroke-width="1.2"></circle>
                        <circle cx="10" cy="10" r="5" fill="#0CD781"></circle>
                    </svg>
                    <h2>Total bet</h2>
                </span>
                <span>₹5.00</span>
            </li>
        </ul>
    </div>
</div>

</body>
</html>
