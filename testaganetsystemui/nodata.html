<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Data Section</title>
    <style>
        /* Base styles for the container */
        .container {
            display: flex;
            flex-direction: column;
            width: 345px; 
            height: auto;
            font-family: 'Poppins', sans-serif;
            color: #ffffff;
        }

        /* The .no-data wrapper */
        .no-data {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px; 
            border-radius: 8px; 
            background-color: rgb(40, 40, 40);
            min-height: 180px;
            width: 100%;
        }

        /* The icon/image */
        .data-icon {
            display: block;
            width: 77.5px; 
            height: 125px; 
            object-fit: fill; /* Updated to match computed styles */
            object-position: 50% 50%;
            margin-bottom: 8px;
        }

        /* The text paragraph */
        .data-text {
            display: block;
            margin: 0;
            padding: 0;
            font-size: 12px;
            color: rgb(123, 115, 115); 
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="no-data">
            <!-- Updated Image URL -->
            <img src="https://13l.life/images/empty-bg-CagnIzRR.webp" alt="No Data" class="data-icon">
            <p class="data-text">No Records</p>
        </div>
    </div>

</body>
</html>
