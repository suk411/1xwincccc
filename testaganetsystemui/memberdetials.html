<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Report Complete</title>
    <style>
        :root {
            --van-main-red: rgb(242, 65, 59);
            --van-bg-page: #f7f8fa;
            --van-text-dark: rgb(30, 38, 55);
            --van-text-secondary: rgb(118, 128, 150);
            --van-text-light: rgb(182, 188, 200);
            --van-accent-orange: rgb(254, 170, 87);
            --van-border: rgb(225, 225, 225);
            --font-stack: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, "Segoe UI", Arial, Roboto, "PingFang SC", miui, "Hiragino Sans GB", "Microsoft Yahei", sans-serif;
        }

        body {
            margin: 0;
            background-color: var(--van-bg-page);
            font-family: var(--font-stack);
            -webkit-font-smoothing: antialiased;
        }

        .TeamReport__C {
            padding: 0 12px;
            width: 100%;
            max-width: 375px;
            margin: 0 auto;
            box-sizing: border-box;
        }

        /* Navbar */
        .navbar {
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            position: relative;
        }

        .navbar__content-title {
            font-size: 18px;
            font-weight: 500;
            color: #000;
        }

        .navbar__content-left {
            position: absolute;
            left: 12px;
        }

        /* Header: Search & Filter */
        .TeamReport__C-head {
            margin-top: 10px;
        }

        .searchbar-container {
            position: relative;
            width: 100%;
            height: 40px;
        }

        .searchbar-container__searchbar {
            width: 100%;
            height: 100%;
            background-color: #fff;
            border-radius: 5px;
            border: none;
            padding: 10px 40px 10px 15px;
            font-size: 14px;
            box-sizing: border-box;
            color: var(--van-text-dark);
        }

        .icon-search {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            fill: var(--van-text-secondary);
        }

        .TeamReport__C-head-line2 {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            gap: 10px;
        }

        .TeamReport__C-head-line2 > div {
            flex: 1;
            height: 40px;
            background-color: #fff;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            font-size: 14px;
            color: var(--van-text-secondary);
        }

        /* Summary Stats (Red Box) */
        .header-container {
            background-color: var(--van-main-red);
            border-radius: 10px;
            padding: 20px 0;
            margin: 20px 0 15px;
            display: flex;
            flex-wrap: wrap;
            row-gap: 24px;
        }

        .header-container > div {
            width: 50%;
            text-align: center;
            color: #fff;
        }

        .header-container .num {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 3px;
            display: block;
        }

        .header-container .label {
            font-size: 12px;
            opacity: 0.9;
        }

        /* Team Members List */
        .TeamReport__C-body-item {
            background-color: #fff;
            border-radius: 5px;
            padding: 0 10px;
            margin-bottom: 10px;
        }

        .TeamReport__C-body-item-head {
            height: 35px;
            padding-top: 5px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 0.8px solid var(--van-border);
            color: var(--van-text-dark);
            font-size: 16px;
        }

        .TeamReport__C-body-item-detail {
            padding: 11px 0;
            font-size: 13px;
        }

        .TeamReport__C-body-item-detail > div {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 15px;
            margin-bottom: 8px;
            color: var(--van-text-secondary);
        }

        .TeamReport__C-body-item-detail > div:last-child {
            margin-bottom: 0;
        }

        /* Specific text colors */
        .val-orange { color: var(--van-accent-orange); }
        .val-light { color: var(--van-text-light); }

        .icon-copy {
            width: 16px;
            height: 16px;
            fill: var(--van-text-secondary);
        }
    </style>
</head>
<body>

    <div class="TeamReport__C">
        <!-- Navbar -->
        <div class="navbar">
            <div class="navbar__content-left">
                <svg width="24" height="24" viewBox="0 0 1024 1024"><path d="M669.6 849.6c8.8 8 22.4 7.2 30.4-1.6s7.2-22.4-1.6-30.4l-309.6-280 309.6-280c8.8-8 9.6-21.6 1.6-30.4s-21.6-9.6-30.4-1.6l-327.2 296c-4.4 4-6.8 9.6-6.8 15.6s2.4 11.6 6.8 15.6l327.2 296.8z"></path></svg>
            </div>
            <div class="navbar__content-title">Subordinate data</div>
        </div>

        <!-- Head Filters -->
        <div class="TeamReport__C-head">
            <div class="searchbar-container">
                <input type="text" class="searchbar-container__searchbar" placeholder="Search subordinate UID">
                <svg class="icon-search" width="18" height="18" viewBox="0 0 1024 1024"><path d="M956.8 905.6L723.2 672c54.4-64 86.4-147.2 86.4-236.8 0-204.8-166.4-371.2-371.2-371.2S67.2 230.4 67.2 435.2s166.4 371.2 371.2 371.2c89.6 0 172.8-32 236.8-86.4l233.6 233.6c6.4 6.4 16 9.6 25.6 9.6s19.2-3.2 25.6-9.6c12.8-12.8 12.8-32 0-44.8zM131.2 435.2c0-169.6 137.6-307.2 307.2-307.2s307.2 137.6 307.2 307.2-137.6 307.2-307.2 307.2-307.2-137.6-307.2-307.2z"></path></svg>
            </div>
            <div class="TeamReport__C-head-line2">
                <div><span>All</span><svg width="12" height="12" viewBox="0 0 1024 1024"><path d="M884 311.6c-9.4-9.4-24.6-9.4-33.9 0L512 649.7 173.9 311.6c-9.4-9.4-24.6-9.4-33.9 0s-9.4 24.6 0 33.9l355.1 355.1c9.4 9.4 24.6 9.4 33.9 0L884 345.5c9.4-9.4 9.4-24.6 0-33.9z"></path></svg></div>
                <div><span>2026-05-22</span><svg width="12" height="12" viewBox="0 0 1024 1024"><path d="M884 311.6c-9.4-9.4-24.6-9.4-33.9 0L512 649.7 173.9 311.6c-9.4-9.4-24.6-9.4-33.9 0s-9.4 24.6 0 33.9l355.1 355.1c9.4 9.4 24.6 9.4 33.9 0L884 345.5c9.4-9.4 9.4-24.6 0-33.9z"></path></svg></div>
            </div>
        </div>

        <div class="TeamReport__C-body">
            <!-- Stats -->
            <div class="header-container">
                <div><span class="num">0</span><span class="label">Deposit number</span></div>
                <div><span class="num">0</span><span class="label">Deposit amount</span></div>
                <div><span class="num">0</span><span class="label">Number of bettors</span></div>
                <div><span class="num">0</span><span class="label">Total bet</span></div>
                <div><span class="num">0</span><span class="label">First deposit number</span></div>
                <div><span class="num">0</span><span class="label">First deposit amount</span></div>
            </div>

            <!-- Item -->
            <div class="TeamReport__C-body-item">
                <div class="TeamReport__C-body-item-head">
                    <div>UID:3540850</div>
                    <svg class="icon-copy" viewBox="0 0 1024 1024"><path d="M768 832V256H192v576h576m0-640a64 64 0 0 1 64 64v576a64 64 0 0 1-64 64H192a64 64 0 0 1-64-64V256a64 64 0 0 1 64-64h576m-128-128v64H128v576H64V128a64 64 0 0 1 64-64h512z"></path></svg>
                </div>
                <div class="TeamReport__C-body-item-detail">
                    <div>Level <span>1</span></div>
                    <div>Deposit amount <span class="val-orange">0</span></div>
                    <div>Commission <span class="val-orange">0</span></div>
                    <div>Register Time <span class="val-light">2026-05-22</span></div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
